name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  # Surface backtraces on test failures during release builds (rare but
  # useful when a release-only optimization breaks a test).
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux musl: static binary, runs on any glibc.
          # Built with `cross` so we get the right musl-libc + linker.
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            archive_ext: tar.gz
          # macOS: native cargo on the matching runner (M-series + Intel).
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-13
            use_cross: false
            archive_ext: tar.gz
          # Windows: native cargo, zip archive.
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            use_cross: false
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, target ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # Key off target so each matrix entry gets its own cache.
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --locked --version 0.2.5

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (native cargo)
        if: matrix.use_cross == false
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Derive a clean version string from the tag (strip leading "v").
      # Used in the artifact filename.
      - name: Derive version
        id: version
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          v="${REF_NAME#v}"
          echo "version=${v}" >> "$GITHUB_OUTPUT"

      # Package: tar.gz on Unix, zip on Windows. Include the binary and
      # the LICENSE / README so the archive is self-contained.
      - name: Package (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          stage="$(mktemp -d)"
          name="tools4a-${VERSION}-${TARGET}"
          mkdir -p "$stage/$name"
          cp "target/${TARGET}/release/tools4a" "$stage/$name/"
          cp README.md "$stage/$name/" || true
          # LICENSE may or may not exist yet — keep optional.
          [ -f LICENSE ] && cp LICENSE "$stage/$name/" || true
          tar -czf "${name}.tar.gz" -C "$stage" "$name"
          echo "ASSET=${name}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $name = "tools4a-$env:VERSION-$env:TARGET"
          $stage = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP $name)
          Copy-Item "target/$env:TARGET/release/tools4a.exe" -Destination $stage.FullName
          if (Test-Path README.md)  { Copy-Item README.md  -Destination $stage.FullName }
          if (Test-Path LICENSE)    { Copy-Item LICENSE    -Destination $stage.FullName }
          Compress-Archive -Path $stage.FullName -DestinationPath "$name.zip"
          "ASSET=$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Allow this job to create the release.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} dist/ \;
          ls -la dist/

      - name: Create GitHub Release + upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
